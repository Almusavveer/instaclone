<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Insights & Blogs</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#000;
      font-family:'Inter',sans-serif;
      color:#fff;
      overflow-x:hidden;
    }

    .container{
      width:100%;
      max-width:1440px;
      margin:auto;
      padding:28px 55px 60px;
    }

    /* ================= NAVBAR ================= */

    nav{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:70px;
    }

    .logo{
      display:flex;
      align-items:center;
      gap:12px;
      font-size:20px;
      font-weight:700;
    }

    .logo i{
      font-size:28px;
    }

    .nav-links{
      display:flex;
      gap:55px;
      list-style:none;
    }

    .nav-links a{
      text-decoration:none;
      color:#fff;
      font-size:18px;
      font-weight:500;
      transition:0.3s;
    }

    .nav-links a:hover{
      color:#ff5b14;
    }

    .btn{
      padding:18px 30px;
      border:none;
      border-radius:18px;
      background:#111;
      color:#fff;
      font-size:18px;
      font-weight:500;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{
      background:#ff5b14;
    }

    /* ================= HERO ================= */

    .hero{
      width:100%;
      text-align:center;
    }

    .hero h1{
      font-size:clamp(70px,10vw,170px);
      line-height:0.95;
      font-weight:800;
      margin-bottom:50px;
      letter-spacing:-4px;
    }

    /* ================= FILTERS ================= */

    .filters{
      display:flex;
      justify-content:center;
      gap:18px;
      margin-bottom:60px;
      flex-wrap:wrap;
    }

    .filter-btn{
      padding:18px 34px;
      border:none;
      border-radius:40px;
      background:#111;
      color:#fff;
      font-size:18px;
      font-weight:500;
      cursor:pointer;
      transition:0.3s;
    }

    .filter-btn.active{
      background:#ff5b14;
    }

    /* ================= BLOG GRID ================= */

    .blog-grid{
      width:100%;
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:24px;
    }

    /* ================= CARD ================= */

    .card{
      background:#070707;
      border-radius:30px;
      overflow:hidden;
      transition:0.35s;
      display:flex;
      flex-direction:column;
    }

    .card:hover{
      transform:translateY(-6px);
    }

    .card img{
      width:100%;
      height:320px;
      object-fit:cover;
      display:block;
    }

    .card-content{
     background: #0a0a0a;
    padding: 30px;
    min-height: 240px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    }

    .tag{
      display:inline-flex;
      align-items:center;
      justify-content:center;

      width:fit-content;
      padding:10px 18px;

      border-radius:30px;
      background:#2a140d;
      color:#ff8c4b;

      font-size:18px;
      font-weight:500;

      margin-bottom:24px;
    }

    .card h2{
      font-size:24px;
      line-height:1.15;
      font-weight:500;
      color:#fff;

      margin-bottom:35px;
    }

    .date{
      margin-top:auto;

      color:#7c7c7c;
      font-size:18px;
      font-weight:400;
    }

    /* ================= RESPONSIVE ================= */

    @media(max-width:1100px){

      .blog-grid{
        grid-template-columns:1fr;
      }

      nav{
        flex-direction:column;
        gap:30px;
      }

      .nav-links{
        gap:24px;
        flex-wrap:wrap;
        justify-content:center;
      }

      .container{
        padding:25px 20px 50px;
      }

      .hero h1{
        font-size:70px;
      }
    }

    @media(max-width:600px){

      .hero h1{
        font-size:52px;
        letter-spacing:-2px;
      }

      .card img{
        height:240px;
      }

      .card-content{
        min-height:auto;
      }

      .filter-btn{
        padding:14px 22px;
        font-size:16px;
      }

      .card h2{
        font-size:22px;
      }
    }

  </style>
</head>
<body>

  <div class="container">

    <!-- NAVBAR -->

    <nav>

      <div class="logo">
        <i class="fa-solid fa-layer-group"></i>
        <span>ScaleX</span>
      </div>

      <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">About Us</a></li>
        <li><a href="#">Blogs</a></li>
        <li><a href="#">Contact Us</a></li>
      </ul>

      <button class="btn">Get Started</button>

    </nav>

    <!-- HERO -->

    <section class="hero">

      <h1>Insights & Blogs</h1>

      <!-- FILTER BUTTONS -->

      <div class="filters">
        <button class="filter-btn active">All</button>
        <button class="filter-btn">Tech</button>
        <button class="filter-btn">SaaS</button>
        <button class="filter-btn">Marketing</button>
      </div>

      <!-- BLOG CARDS -->

      <div class="blog-grid">

        <!-- CARD 1 -->

        <div class="card">

          <img src="https://i.pinimg.com/1200x/8d/d9/56/8dd956db860e0ce776701cec072eba55.jpg" alt="">

          <div class="card-content">

            <span class="tag">Tech</span>

            <h2>
              The Ultimate Guide To<br>
              SaaS Marketing
            </h2>

            <p class="date">May 23, 2025</p>

          </div>

        </div>

        <!-- CARD 2 -->

        <div class="card">

          <img src="https://i.pinimg.com/1200x/b5/ac/c6/b5acc6c2f4a48c0a5f375378a9462f21.jpg" alt="">

          <div class="card-content">

            <span class="tag">SaaS</span>

            <h2>
                <div>
                     5 Key Trends In SaaS
                </div>
             <div>
                 Growth For 2025
             </div>
             
            </h2>

            <p class="date">May 23, 2025</p>

          </div>

        </div>

        <!-- CARD 3 -->

        <div class="card">

          <img src="https://i.pinimg.com/1200x/3c/4a/0b/3c4a0b1790593d4fe45bddff12006eb6.jpg" alt="">

          <div class="card-content">

            <span class="tag">Marketing</span>

            <h2>
              How Data-Driven<br>
              Strategies Are Important
            </h2>

            <p class="date">May 23, 2025</p>

          </div>

        </div>

      </div>

    </section>

  </div>

</body>
</html>
